<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Avenmark Digital</title>

    <!-- Google Font Fallback -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">

    <!-- Lovelo Font -->
    <style>
        @font-face {
            font-family: "Lovelo";
            src: url("Lovelo.otf") format("opentype");
            font-weight: 700;
        }
    </style>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- ===========================
         HEADER (GRID STRUCTURE READY)
    ============================ -->

    <header class="main-header">

        <!-- LEFT: BRAND -->
        <div class="header-left">

            <img
                src="IMG_4332.jpeg"
                class="header-logo"
                alt="Avenmark Logo">

            <div class="title-block">

                <div class="name">
                    ETHAN MCCAFFREY
                </div>

                <div class="slogan">
                    MAKING MIDLANDS MORE
                </div>

            </div>

        </div>

        <!-- RIGHT: NAV -->
        <nav class="header-right">

            <a class="nav-item" href="#">
                ABOUT
            </a>

            <a class="nav-item" href="#">
                ACHIEVEMENTS
            </a>

            <a class="nav-item message-item" href="#">
                ETHAN'S MESSAGE
            </a>

        </nav>

    </header>

    <!-- ===========================
         HERO / CONTENT AREA (READY)
    ============================ -->

    <main class="page-content">

        <!-- Future hero section goes here -->

    </main>

    <!-- ===========================
         FOOTER (STABLE STRUCTURE)
    ============================ -->

    <footer class="main-footer">

        <!-- BRAND -->
        <div class="footer-name">
            ETHAN MCCAFFREY
        </div>

        <div class="footer-tagline">
            MAKING MIDLANDS MORE
        </div>

        <!-- OWNER -->
        <a class="footer-owner" href="#">
            Made by Ethan McCaffrey at Avenmark Digital
        </a>

        <!-- LOCATION + WEATHER -->
        <div class="footer-weather-line">

            <span>Clemson, SC</span>

            <span class="footer-divider">•</span>

            <span id="weather">
                Loading weather...
            </span>

        </div>

        <!-- TIME -->
        <div id="datetime" class="footer-time">
            Loading date...
        </div>

        <!-- COPYRIGHT -->
        <div class="footer-copyright">

            <span>
                © <span id="year">2026</span>
            </span>

            <span class="footer-divider">•</span>

            <a href="#">
                Avenmark Digital Development
            </a>

        </div>

    </footer>

    <!-- SCRIPT -->
    <script src="script.js"></script>

</body>

</html>
