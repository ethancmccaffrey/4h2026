<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avenmark Digital</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">

    <style>
        @font-face {
            font-family: "Lovelo";
            src: url("Lovelo.otf") format("opentype");
            font-weight: 700;
        }
    </style>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<header class="header">
    <div class="header-left">
        <img src="IMG_4332.jpeg" class="logo" alt="Logo">

        <div class="brand">
            <div class="name">ETHAN MCCAFFREY</div>
            <div class="tagline">MAKING MIDLANDS MORE</div>
        </div>
    </div>

    <nav class="header-right">
        <a href="#about">ABOUT</a>
        <a href="#achievements">ACHIEVEMENTS</a>
        <a href="#message">MESSAGE</a>
    </nav>
</header>

<!-- HERO -->
<main>

<section class="hero">

    <!-- background grid -->
    <div class="grid"></div>

    <!-- corner images -->
    <img src="IMG_5039.jpeg" class="img top-left">
    <img src="IMG_5259.jpeg" class="img bottom-right">

    <!-- main text -->
    <div class="hero-center">

        <div class="lines">
            <div>SERVING RESPONSIBLY</div>
            <div>LEADING WITH CONSISTENCY</div>
            <div>BUILDING CONNECTIONS.</div>
        </div>

        <div class="welcome">Welcome.</div>

        <div class="buttons">
            <a href="#about">ABOUT</a>
            <a href="#achievements">ACHIEVEMENTS</a>
            <a href="#message">MESSAGE</a>
        </div>

    </div>

</section>

<!-- SECTIONS -->
<section id="about"></section>
<section id="achievements"></section>
<section id="message"></section>

</main>

<!-- FOOTER -->
<footer class="footer">
    <div class="footer-title">ETHAN MCCAFFREY</div>
    <div class="footer-sub">MAKING MIDLANDS MORE</div>

    <div id="weather">Loading weather...</div>
    <div id="datetime">Loading time...</div>

    <div class="footer-bottom">© 2026 Avenmark Digital</div>
</footer>

<script src="script.js"></script>

</body>
</html>
